<nav class="tt-topbar">

  <!-- Left: Search -->
  <div class="topbar-left">
    <div class="search-wrap">
      <i class="pi pi-search search-icon"></i>
      <input
        type="text"
        class="search-input"
        placeholder="Search customers, queue, barbers…"
      />
      <kbd class="search-kbd">⌘K</kbd>
    </div>
  </div>

  <!-- Right: Actions + Profile -->
  <div class="topbar-right">

    <!-- Notification Bell -->
    <button class="icon-btn" pTooltip="Notifications" tooltipPosition="bottom">
      <i class="pi pi-bell"></i>
      <span class="badge-dot" *ngIf="notificationCount > 0">
        {{ notificationCount }}
      </span>
    </button>

    <!-- Help -->
    <button class="icon-btn" pTooltip="Help &amp; Docs" tooltipPosition="bottom">
      <i class="pi pi-question-circle"></i>
    </button>

    <div class="nav-divider"></div>

    <!-- Profile Button -->
    <div class="profile-btn" (click)="toggleProfile()">
      <div class="profile-avatar">
        <span>{{ userInitials }}</span>
      </div>
      <div class="profile-info">
        <span class="profile-name">{{ shopName }}</span>
        <span class="profile-role">{{ userRole }}</span>
      </div>
      <i class="pi pi-chevron-down profile-chevron" [class.rotated]="profileOpen"></i>
    </div>

    <!-- Profile Dropdown -->
    <div class="profile-dropdown" *ngIf="profileOpen">
      <div class="dropdown-header">
        <div class="dropdown-avatar">{{ userInitials }}</div>
        <div>
          <div class="dropdown-name">{{ shopName }}</div>
          <div class="dropdown-email">{{ userRole }}</div>
        </div>
      </div>
      <div class="dropdown-divider"></div>
      <button class="dropdown-item" (click)="goToSettings()">
        <i class="pi pi-cog"></i> Shop Settings
      </button>
      <div class="dropdown-divider"></div>
      <button class="dropdown-item danger" (click)="logout()">
        <i class="pi pi-sign-out"></i> Sign Out
      </button>
    </div>

  </div>
</nav>
