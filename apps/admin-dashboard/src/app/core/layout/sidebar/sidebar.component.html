<div class="sidebar-wrap">

  <!-- ── Logo ── -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <span class="logo-scissors">✂</span>
    </div>
    <div class="logo-text-wrap">
      <span class="logo-text">QueueCut</span>
      <span class="logo-tagline">Admin Panel</span>
    </div>
  </div>

  <!-- ── Navigation Groups ── -->
  <nav class="sidebar-nav">
    <ng-container *ngFor="let group of navGroups">

      <span class="nav-section-label">{{ group.label }}</span>

      <a
        *ngFor="let item of group.items"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-item"
      >
        <span class="nav-icon">
          <i [class]="item.icon"></i>
        </span>
        <span class="nav-label">{{ item.label }}</span>
        <span class="nav-badge" *ngIf="item.badge">{{ item.badge }}</span>
      </a>

    </ng-container>
  </nav>

  <!-- ── Footer ── -->
  <div class="sidebar-footer">

    <!-- Connection status -->
    <div class="ws-status">
      <span class="ws-dot"></span>
      <span class="ws-label">WebSocket Live</span>
    </div>

    <div class="shop-pill">
      <div class="shop-avatar">MB</div>
      <div class="shop-info">
        <span class="shop-name">Mike's Barber Shop</span>
        <span class="shop-plan">✦ Pro Plan</span>
      </div>
      <i class="pi pi-chevron-up shop-chevron"></i>
    </div>

  </div>

</div>
