<div class="login-shell">
  <div class="login-grid">
    <section class="left-panel">
      <div class="logo">✂ QueueCut</div>
      <div class="headline">{{ roleLabel }} Login</div>
      <p class="subtitle">Enter your credentials to continue.</p>

      <div class="login-card">
        <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form">
          <label class="floating-label">Username or Email</label>
          <input id="username" type="text" class="input-control" formControlName="username" placeholder="Enter username or email" />

          <label class="floating-label">Password</label>
          <input id="password" type="password" class="input-control" formControlName="password" placeholder="Enter password" />

          <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || loading">
            <span *ngIf="!loading">Login</span>
            <span *ngIf="loading">Logging in...</span>
          </button>
        </form>

        <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
      </div>
    </section>

    <section class="right-panel">
      <div class="hero-content">
        <div class="hero-badge">Modern queue operations</div>
        <h1>Seamless work experience</h1>
        <p>Everything you need in a customizable, modern dashboard.</p>
      </div>
      <div class="hero-graphic"></div>
    </section>
  </div>
</div>
