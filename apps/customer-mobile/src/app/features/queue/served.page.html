<ion-content [fullscreen]="true" class="served-content">

  <div class="served-layout animate-in">

    <!-- Success Icon -->
    <div class="success-ring">
      <div class="success-circle">
        <ion-icon name="checkmark-outline" class="check-icon"></ion-icon>
      </div>
    </div>

    <!-- Message -->
    <div class="served-message">
      <h1 class="served-title">All Done!</h1>
      <p class="served-sub">
        Your service is complete. Thanks for using QueueCut — see you next time!
      </p>
    </div>

    <!-- Summary Card -->
    <div class="summary-card animate-in" style="animation-delay: 0.15s">
      <div class="summary-row">
        <span class="sum-label">
          <ion-icon name="storefront-outline"></ion-icon>
          Shop
        </span>
        <span class="sum-val">Mike's Barber Shop</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-row">
        <span class="sum-label">
          <ion-icon name="cut-outline"></ion-icon>
          Service
        </span>
        <span class="sum-val">Haircut</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-row">
        <span class="sum-label">
          <ion-icon name="time-outline"></ion-icon>
          Time
        </span>
        <span class="sum-val">{{ today | date:'shortTime' }}</span>
      </div>
    </div>

    <!-- Rating -->
    <div class="rating-section animate-in" style="animation-delay: 0.22s">
      <p class="rating-label">How was your experience?</p>
      <div class="stars">
        <ion-icon
          *ngFor="let s of [1,2,3,4,5]"
          [name]="s <= rating ? 'star' : 'star-outline'"
          class="star"
          [class.filled]="s <= rating"
          (click)="setRating(s)"
        ></ion-icon>
      </div>
    </div>

    <!-- Actions -->
    <div class="served-actions animate-in" style="animation-delay: 0.28s">
      <ion-button
        expand="block"
        shape="round"
        class="scan-again-btn"
        routerLink="/tabs/scan"
      >
        <ion-icon name="qr-code-outline" slot="start"></ion-icon>
        Scan Another Shop
      </ion-button>
      <ion-button
        expand="block"
        fill="clear"
        class="profile-link-btn"
        routerLink="/tabs/profile"
      >
        View My Profile
      </ion-button>
    </div>

  </div>

</ion-content>
